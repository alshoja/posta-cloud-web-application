x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "100"

networks:
  common-net: {}

services:
  postgres_db:
    container_name: posta_cloud_db
    image: pgvector/pgvector:pg17
    platform: linux/amd64
    ports:
      - ${POSTGRESQL_PORT}:5432
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=${POSTGRESQL_DATABASE}
      - POSTGRES_USER=${POSTGRESQL_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD}
    logging: *default-logging
    networks:
      - common-net
  pgadmin:
    container_name: posta_cloud_pgadmin
    image: dpage/pgadmin4:latest
    platform: linux/amd64
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    depends_on:
      - postgres_db
    networks:
      - common-net
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - common-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: posta_cloud_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - common-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - common-net

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/aistor/minio:latest}
    container_name: posta_cloud_minio
    command: server /data --console-address ":9001" --license /minio.license
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
      - ./secrets/minio.license:/minio.license:ro
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    logging: *default-logging
    networks:
      - common-net

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/policies:/policies:ro
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - S3_BACKEND_ACCESS_KEY=${S3_BACKEND_ACCESS_KEY}
      - S3_BACKEND_SECRET_KEY=${S3_BACKEND_SECRET_KEY}
      - S3_OCR_ACCESS_KEY=${S3_OCR_ACCESS_KEY}
      - S3_OCR_SECRET_KEY=${S3_OCR_SECRET_KEY}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/posta-record-documents local/posta-profile-images local/posta-transient
        mc anonymous set none local/posta-record-documents
        mc anonymous set none local/posta-profile-images
        mc anonymous set none local/posta-transient
        mc admin accesskey create local/ "$$MINIO_ROOT_USER" --access-key "$$S3_BACKEND_ACCESS_KEY" --secret-key "$$S3_BACKEND_SECRET_KEY" --policy /policies/backend.json || true
        mc admin accesskey create local/ "$$MINIO_ROOT_USER" --access-key "$$S3_OCR_ACCESS_KEY" --secret-key "$$S3_OCR_SECRET_KEY" --policy /policies/ocr-worker.json || true
    networks:
      - common-net

  ocr-worker:
    build: ./ocr-worker
    container_name: ocr_worker
    depends_on:
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./ocr-worker:/app
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_OCR_ACCESS_KEY=${S3_OCR_ACCESS_KEY}
      - S3_OCR_SECRET_KEY=${S3_OCR_SECRET_KEY}
    networks:
      - common-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_ASSET_URL=${VITE_ASSET_URL}
    depends_on:
      - backend
    networks:
      - common-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - BASE_URL=${VITE_ASSET_URL}
      - NODE_ENV=${NODE_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=${PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-embeddinggemma}
      - AI_CHAT_ENABLED=${AI_CHAT_ENABLED:-true}
      - DOCUMENT_SEARCH_BM25_ENABLED=${DOCUMENT_SEARCH_BM25_ENABLED:-false}
      - ELASTICSEARCH_NODE=${ELASTICSEARCH_NODE:-http://elasticsearch:9200}
      - ELASTICSEARCH_INDEX=${ELASTICSEARCH_INDEX:-document_chunks}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BACKEND_ACCESS_KEY=${S3_BACKEND_ACCESS_KEY}
      - S3_BACKEND_SECRET_KEY=${S3_BACKEND_SECRET_KEY}
    depends_on:
      postgres_db:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      ollama:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - common-net

volumes:
  db-data:
    name: posta_cloud_db_data
  pgadmin-data:
  ollama-data:
  elasticsearch-data:
    name: posta_cloud_elasticsearch_data
  minio-data:
    name: posta_cloud_minio_data

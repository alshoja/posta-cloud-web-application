x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "100"

networks:
  common-net: {}

services:
  postgres_db:
    container_name: posta_cloud_db
    image: bitnami/postgresql:latest
    platform: linux/amd64
    ports:
      - ${POSTGRESQL_PORT}:5432
    restart: always
    volumes:
      - db-data:/bitnami/postgresql
      - ./database/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_LOGGING_COLLECTOR=true
      - POSTGRESQL_LOG_MIN_ERROR_STATEMENT=error
      - POSTGRESQL_LOG_STATEMENTS=all
    logging: *default-logging
    networks:
      - common-net
  pgadmin:
    container_name: posta_cloud_pgadmin
    image: dpage/pgadmin4:latest
    platform: linux/amd64
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    depends_on:
      - postgres_db
    networks:
      - common-net
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - common-net

  ocr-worker:
    build: ./ocr-worker
    container_name: ocr_worker
    depends_on:
      - redis
    volumes:
      - ./ocr-worker:/app
      - ./backend/uploads:/app/uploads
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
    networks:
      - common-net

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_ASSET_URL=${VITE_ASSET_URL}
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - /app/node_modules
    environment:
      - BASE_URL=${VITE_ASSET_URL}
      - NODE_ENV=${NODE_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=${PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
    depends_on:
      - postgres_db
      - redis
    networks:
      - common-net

volumes:
  db-data:
    name: posta_cloud_db_data
  pgadmin-data:

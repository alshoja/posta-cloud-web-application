x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "100"

networks:
  common-net: {}

services:
  postgres_db:
    image: pgvector/pgvector:pg17
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=${POSTGRESQL_DATABASE}
      - POSTGRES_USER=${POSTGRESQL_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD}
    logging: *default-logging
    networks:
      - common-net

  redis:
    image: redis:7
    restart: always
    logging: *default-logging
    networks:
      - common-net

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama-data:/root/.ollama
    logging: *default-logging
    networks:
      - common-net

  minio:
    image: ${MINIO_IMAGE}
    restart: always
    command: server /data --console-address ":9001" --license /minio.license
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
      - ./secrets/minio.license:/minio.license:ro
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - common-net

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/policies:/policies:ro
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - S3_BACKEND_ACCESS_KEY=${S3_BACKEND_ACCESS_KEY}
      - S3_BACKEND_SECRET_KEY=${S3_BACKEND_SECRET_KEY}
      - S3_OCR_ACCESS_KEY=${S3_OCR_ACCESS_KEY}
      - S3_OCR_SECRET_KEY=${S3_OCR_SECRET_KEY}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/posta-record-documents local/posta-profile-images local/posta-transient
        mc anonymous set none local/posta-record-documents
        mc anonymous set none local/posta-profile-images
        mc anonymous set none local/posta-transient
        mc admin accesskey create local/ "$$MINIO_ROOT_USER" --access-key "$$S3_BACKEND_ACCESS_KEY" --secret-key "$$S3_BACKEND_SECRET_KEY" --policy /policies/backend.json || true
        mc admin accesskey create local/ "$$MINIO_ROOT_USER" --access-key "$$S3_OCR_ACCESS_KEY" --secret-key "$$S3_OCR_SECRET_KEY" --policy /policies/ocr-worker.json || true
    logging: *default-logging
    networks:
      - common-net

  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      - BASE_URL=${VITE_ASSET_URL}
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=${PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-embeddinggemma}
      - AI_CHAT_ENABLED=${AI_CHAT_ENABLED:-true}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BACKEND_ACCESS_KEY=${S3_BACKEND_ACCESS_KEY}
      - S3_BACKEND_SECRET_KEY=${S3_BACKEND_SECRET_KEY}
    depends_on:
      postgres_db:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    logging: *default-logging
    networks:
      - common-net

  ocr-worker:
    build:
      context: ./ocr-worker
    restart: always
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_OCR_ACCESS_KEY=${S3_OCR_ACCESS_KEY}
      - S3_OCR_SECRET_KEY=${S3_OCR_SECRET_KEY}
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    logging: *default-logging
    networks:
      - common-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ASSET_URL: ${VITE_ASSET_URL}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    logging: *default-logging
    networks:
      - common-net

volumes:
  db-data:
    name: posta_cloud_prod_db_data
  ollama-data:
  minio-data:
    name: posta_cloud_prod_minio_data

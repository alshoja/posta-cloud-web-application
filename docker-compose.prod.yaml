x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "100"

networks:
  common-net: {}

services:
  postgres_db:
    image: pgvector/pgvector:pg17
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=${POSTGRESQL_DATABASE}
      - POSTGRES_USER=${POSTGRESQL_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD}
    logging: *default-logging
    networks:
      - common-net

  redis:
    image: redis:7
    restart: always
    logging: *default-logging
    networks:
      - common-net

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama-data:/root/.ollama
    logging: *default-logging
    networks:
      - common-net

  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - backend-uploads:/app/uploads
    environment:
      - BASE_URL=${VITE_ASSET_URL}
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=${PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-embeddinggemma}
      - AI_CHAT_ENABLED=${AI_CHAT_ENABLED:-true}
    depends_on:
      - postgres_db
      - redis
      - ollama
    logging: *default-logging
    networks:
      - common-net

  ocr-worker:
    build:
      context: ./ocr-worker
    restart: always
    volumes:
      - backend-uploads:/app/uploads
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OCR_QUEUE_NAME=${OCR_QUEUE_NAME}
    depends_on:
      - redis
      - backend
    logging: *default-logging
    networks:
      - common-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_ASSET_URL: ${VITE_ASSET_URL}
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    logging: *default-logging
    networks:
      - common-net

volumes:
  db-data:
    name: posta_cloud_prod_db_data
  backend-uploads:
    name: posta_cloud_prod_backend_uploads
  ollama-data:
